name = "lfx-calendar"
main = "worker.js"
compatibility_date = "2025-06-01"

# The Worker URL will be:
#   https://lfx-calendar.<your-cf-subdomain>.workers.dev/
#
# LFX_ICS_URL is stored as a secret (not in this file). Set it once with:
#   wrangler secret put LFX_ICS_URL
#
# Optionally add a shared-secret token to gate the endpoint:
#   wrangler secret put ACCESS_TOKEN
# and then subscribe Google to https://lfx-calendar.<sub>.workers.dev/?token=<value>

# Optional: cap RRULE UNTIL at a different horizon.
# [vars]
# UNTIL_CAP = "20300101T000000Z"
